spring:
  application:
    name: mini-wsa-security-analytics

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mini_wsa}
    username: ${DB_USERNAME:mini_wsa}
    password: ${DB_PASSWORD:mini_wsa_dev}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always